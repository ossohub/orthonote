<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algoritmos de Tratamento Ortopédico</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#0e1117;color:#e2e8f0;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
#header{background:linear-gradient(135deg,#1a1f2e 0%,#12161f 100%);border-bottom:1px solid #2a3347;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#header h1{font-size:15px;font-weight:700;color:#e2a84b;letter-spacing:.3px}
#header .sub{font-size:10px;color:#4a5568;margin-left:auto}
#header .badge{background:#e2a84b22;color:#e2a84b;border:1px solid #e2a84b44;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600}
#regions-bar{background:#0d1119;border-bottom:1px solid #1a2030;padding:0 12px;display:flex;gap:1px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#regions-bar::-webkit-scrollbar{display:none}
.rbtn{display:flex;align-items:center;gap:5px;padding:9px 12px;background:transparent;border:none;border-bottom:2px solid transparent;color:#4a5568;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.rbtn:hover{color:#94a3b8;background:#111827}
.rbtn.active{color:var(--rc);border-bottom-color:var(--rc)}
.rbtn .ico{font-size:13px}
#content{flex:1;overflow-y:auto;padding:18px;background:#0e1117}
.rh{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1a2030}
.rh-icon{font-size:26px}
.rh h2{font-size:17px;font-weight:700;color:var(--rc)}
.rh-count{background:#1a2030;color:#4a5568;border-radius:20px;padding:2px 10px;font-size:10px;margin-left:4px}
.alg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.acard{background:#111827;border:1px solid #1a2030;border-left:3px solid var(--rc);border-radius:8px;padding:13px;cursor:pointer;transition:all .15s}
.acard:hover{background:#161f30;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4);border-color:var(--rc)}
.acard .cn{font-size:9px;color:#374151;font-weight:700;margin-bottom:3px;letter-spacing:.5px}
.acard .ct{font-size:12px;font-weight:600;color:#e2e8f0;margin-bottom:5px;line-height:1.35}
.acard .cs{font-size:10px;color:#374151}
.acard .ctags{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.tag-c{background:#14532d33;color:#4ade80}
.tag-s{background:#1e3a5f33;color:#60a5fa}
.tag-sm{background:#4c1d9533;color:#a78bfa}
.tag-e{background:#7f1d1d33;color:#f87171}
.tag-p{background:#0c4a6e33;color:#38bdf8}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(5px)}
#ov.hidden{display:none}
#mod{background:#111827;border:1px solid #2a3347;border-radius:12px;width:100%;max-width:660px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.7)}
#mhd{background:linear-gradient(135deg,#161f30 0%,#111827 100%);border-bottom:1px solid #2a3347;padding:14px 18px;display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
#mhd .mhi{font-size:22px;flex-shrink:0;margin-top:2px}
#mhd .mhinfo{flex:1}
#mhd h3{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:2px;line-height:1.3}
#mhd .mhsrc{font-size:10px;color:#374151}
#mclose{background:#1a2030;border:1px solid #2a3347;color:#4a5568;width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .15s}
#mclose:hover{background:#7f1d1d;color:#f87171;border-color:#7f1d1d}
#mprog{background:#0d1119;border-bottom:1px solid #1a2030;padding:7px 18px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pbar{flex:1;height:3px;background:#1a2030;border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--rc,#e2a84b);border-radius:2px;transition:width .3s}
.ptxt{font-size:10px;color:#374151;white-space:nowrap}
#mbody{flex:1;overflow-y:auto;padding:18px}
.breadcrumbs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.bc{font-size:9px;background:#1a2030;color:#374151;padding:2px 7px;border-radius:3px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc.cur{background:var(--rc-dim,#e2a84b22);color:var(--rc,#e2a84b)}
.nq{background:#161f30;border:1px solid #2a3347;border-radius:10px;padding:18px;margin-bottom:14px}
.nq-lbl{font-size:9px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.nq-txt{font-size:14px;font-weight:600;color:#e2e8f0;line-height:1.5}
.nq-ctx{font-size:11px;color:#4a5568;margin-top:7px;line-height:1.55}
.opts{display:grid;gap:7px}
.opts.two{grid-template-columns:1fr 1fr}
.opt{background:#1a2030;border:1px solid #2a3347;border-radius:8px;padding:11px 14px;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:9px}
.opt:hover{background:#1e293b;border-color:var(--rc)}
.opt.yes:hover{background:#14532d22;border-color:#4ade80}
.opt.no:hover{background:#7c3aed22;border-color:#a78bfa}
.opt-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.opt-lbl{font-size:12px;font-weight:600;color:#e2e8f0}
.opt-dsc{font-size:10px;color:#4a5568;margin-top:2px;line-height:1.4}
.rn{border-radius:10px;padding:18px;margin-bottom:14px}
.rn.conservative{background:#14532d22;border:1px solid #4ade8033}
.rn.surgical{background:#1e3a5f22;border:1px solid #60a5fa33}
.rn.surgical-major{background:#4c1d9522;border:1px solid #a78bfa33}
.rn.emergency{background:#7f1d1d33;border:1px solid #f8717133}
.rn-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 9px;border-radius:4px;margin-bottom:10px}
.conservative .rn-badge{background:#14532d44;color:#4ade80}
.surgical .rn-badge{background:#1e3a5f44;color:#60a5fa}
.surgical-major .rn-badge{background:#4c1d9544;color:#a78bfa}
.emergency .rn-badge{background:#7f1d1d55;color:#f87171}
.rn-title{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:8px}
.rn-txt{font-size:11px;color:#94a3b8;line-height:1.65}
.rn-details{margin-top:12px;border-top:1px solid #2a3347;padding-top:10px}
.rn-di{display:flex;gap:8px;font-size:11px;color:#94a3b8;padding:4px 0;border-bottom:1px solid #1a2030}
.rn-di:last-child{border-bottom:none}
.rn-di .dil{color:#374151;min-width:110px;flex-shrink:0;font-weight:600}
#mft{border-top:1px solid #1a2030;padding:11px 18px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-shrink:0}
.btn{padding:7px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-sec{background:#1a2030;color:#4a5568}.btn-sec:hover{background:#2a3347;color:#94a3b8}
.btn-pri{background:var(--rc,#e2a84b);color:#0e1117}.btn-pri:hover{opacity:.9}
.btn:disabled{opacity:.3;cursor:not-allowed}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#2a3347;border-radius:3px}
.r-geral{--rc:#f59e0b;--rc-dim:#f59e0b22}
.r-ombro{--rc:#3b82f6;--rc-dim:#3b82f622}
.r-cotovelo{--rc:#8b5cf6;--rc-dim:#8b5cf622}
.r-punho{--rc:#ec4899;--rc-dim:#ec489922}
.r-coluna{--rc:#14b8a6;--rc-dim:#14b8a622}
.r-pelve{--rc:#f97316;--rc-dim:#f9731622}
.r-quadril{--rc:#ef4444;--rc-dim:#ef444422}
.r-joelho{--rc:#10b981;--rc-dim:#10b98122}
.r-perna{--rc:#6366f1;--rc-dim:#6366f122}
.r-pediatria{--rc:#06b6d4;--rc-dim:#06b6d422}
</style>
</head>
<body>
<div id="app">
<div id="header">
  <span style="font-size:20px">🦴</span>
  <div>
    <h1>Algoritmos de Tratamento Ortopédico</h1>
    <div class="sub">Campbell's 15ª ed. · Rockwood Adults 10ª ed. · Rockwood Children 10ª ed.</div>
  </div>
  <span class="badge">Beta</span>
</div>
<div id="regions-bar">
  <button class="rbtn active" data-r="geral" onclick="showRegion('geral',this)"><span class="ico">⚙️</span>Princípios Gerais</button>
  <button class="rbtn" data-r="ombro" onclick="showRegion('ombro',this)"><span class="ico">🦴</span>Ombro e Clavícula</button>
  <button class="rbtn" data-r="cotovelo" onclick="showRegion('cotovelo',this)"><span class="ico">💪</span>Cotovelo</button>
  <button class="rbtn" data-r="punho" onclick="showRegion('punho',this)"><span class="ico">✋</span>Punho e Mão</button>
  <button class="rbtn" data-r="coluna" onclick="showRegion('coluna',this)"><span class="ico">🧱</span>Coluna Vertebral</button>
  <button class="rbtn" data-r="pelve" onclick="showRegion('pelve',this)"><span class="ico">🦋</span>Pelve e Acetábulo</button>
  <button class="rbtn" data-r="quadril" onclick="showRegion('quadril',this)"><span class="ico">🦵</span>Quadril e Fêmur</button>
  <button class="rbtn" data-r="joelho" onclick="showRegion('joelho',this)"><span class="ico">🦿</span>Joelho</button>
  <button class="rbtn" data-r="perna" onclick="showRegion('perna',this)"><span class="ico">🦶</span>Perna, Tornozelo e Pé</button>
  <button class="rbtn" data-r="pediatria" onclick="showRegion('pediatria',this)"><span class="ico">👶</span>Pediatria</button>
</div>
<div id="content"></div>
</div>

<div id="ov" class="hidden" onclick="if(event.target===this)closeModal()">
<div id="mod">
  <div id="mhd">
    <div class="mhi" id="mhd-icon">🔀</div>
    <div class="mhinfo">
      <h3 id="mhd-title">Título</h3>
      <div class="mhsrc" id="mhd-src">Fonte</div>
    </div>
    <button id="mclose" onclick="closeModal()">✕</button>
  </div>
  <div id="mprog">
    <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
    <div class="ptxt" id="ptxt">Passo 1</div>
  </div>
  <div id="mbody"></div>
  <div id="mft">
    <button class="btn btn-sec" id="btn-back" onclick="goBack()" disabled>← Voltar</button>
    <div id="mft-info" style="font-size:10px;color:#374151"></div>
    <button class="btn btn-pri" id="btn-restart" onclick="restartAlg()">↺ Reiniciar</button>
  </div>
</div>
</div>

<script>
const REGIONS = {
  geral:{label:"Princípios Gerais",icon:"⚙️",cls:"r-geral"},
  ombro:{label:"Ombro e Clavícula",icon:"🦴",cls:"r-ombro"},
  cotovelo:{label:"Cotovelo",icon:"💪",cls:"r-cotovelo"},
  punho:{label:"Punho e Mão",icon:"✋",cls:"r-punho"},
  coluna:{label:"Coluna Vertebral",icon:"🧱",cls:"r-coluna"},
  pelve:{label:"Pelve e Acetábulo",icon:"🦋",cls:"r-pelve"},
  quadril:{label:"Quadril e Fêmur",icon:"🦵",cls:"r-quadril"},
  joelho:{label:"Joelho",icon:"🦿",cls:"r-joelho"},
  perna:{label:"Perna, Tornozelo e Pé",icon:"🦶",cls:"r-perna"},
  pediatria:{label:"Pediatria",icon:"👶",cls:"r-pediatria"}
};

const ALGS = {

// ═══════════════════════════════════════
// PRINCÍPIOS GERAIS
// ═══════════════════════════════════════
sca:{
  region:"geral", num:"RWA Alg.17-1",
  title:"Síndrome Compartimental Aguda",
  src:"Rockwood Adults 10ª ed. · Cap. 17",
  icon:"🚨", tags:["e"],
  start:"q1",
  nodes:{
    q1:{type:"q",text:"Paciente de alto risco para SCA?",
      ctx:"Paciente jovem + fratura diafisária de tíbia, fratura do antebraço, trauma de alta energia ou com distúrbio da coagulação?",
      yes:"q2", no:"q3"},
    q2:{type:"q",text:"Monitorização contínua da pressão intracompartimental (PIC) indicada?",
      ctx:"Recomendada em TODOS os pacientes de alto risco. Compartimento anterior da perna é o prioritário.",
      yes:"q4", no:"q4"},
    q3:{type:"q",text:"Sinais e sintomas clínicos sugestivos de SCA?",
      ctx:"Dor desproporcional ao exame, dor à extensão passiva dos dedos, endurecimento do compartimento, parestesias.",
      yes:"q4", no:"r1"},
    r1:{type:"r",cls:"conservative",title:"Conduta Expectante",
      txt:"Sem sinais ou risco: observação rigorosa. Reavaliar a cada 1-2 horas. Manter perfusão sistêmica adequada.",
      details:[["Posição","Membro ao nível do coração — NÃO elevar"],["Gesso","Abrir qualquer imobilização circunferencial"],["Reavaliação","Horária nas primeiras 6h"]]},
    q4:{type:"q",text:"Pressão Diferencial de Perfusão (PDP) < 30 mmHg persistente?",
      ctx:"PDP = Pressão Diastólica − PIC. PDP < 30 mmHg por mais de 2h indica fasciotomia independentemente dos sintomas.",
      yes:"r2", no:"q5"},
    q5:{type:"q",text:"Sintomas clínicos francos + múltiplos sinais presentes?",
      ctx:"Dor intensa, compartimento tenso, déficit neurológico progressivo, dor à extensão passiva.",
      yes:"r2", no:"r3"},
    r2:{type:"r",cls:"emergency",title:"Fasciotomia de Urgência — Imediata",
      txt:"Fasciotomia descompressiva urgente. Não aguardar confirmação laboratorial ou radiológica. Tempo é músculo.",
      details:[["Perna","4 compartimentos via 2 incisões longitudinais"],["Antebraço","3 compartimentos via incisão volar e/ou dorsal"],["Coxa","3 compartimentos via incisão lateral"],["Cobertura","Curativo de pressão negativa (VAC); fechamento tardio em 5-7 dias"],["Fasciotomia tardia","Se > 6h: ainda indicada, mas prognóstico reservado"]]},
    r3:{type:"r",cls:"surgical",title:"Monitorização Contínua — Repetir Avaliação",
      txt:"PDP ainda adequada mas paciente de alto risco. Manter monitorização contínua. Reavaliação frequente.",
      details:[["Frequência","Leitura a cada 30 minutos"],["Limiar","Fasciotomia se PDP cair < 30 mmHg por > 2h"],["Analgesia","Controle da dor sem mascarar sintomas"]]}}
},

frat_patol:{
  region:"geral", num:"RWA Alg.25-1",
  title:"Fratura Patológica",
  src:"Rockwood Adults 10ª ed. · Cap. 25",
  icon:"🦴", tags:["s","sm"],
  start:"q1",
  nodes:{
    q1:{type:"q",text:"Paciente tem diagnóstico de neoplasia maligna primária ou doença óssea primária conhecida?",
      ctx:"Metástases ósseas são a causa mais comum de fratura patológica no adulto. Mieloma, linfoma e carcinoma (mama, pulmão, próstata, rim, tireoide) lideram.",
      yes:"q2", no:"q6"},
    q2:{type:"q",text:"Fratura em osso longo de membro inferior (fêmur ou tíbia)?",
      ctx:"Fraturas de fêmur proximal têm maior morbimortalidade e menor probabilidade de consolidação espontânea.",
      yes:"q3", no:"q4"},
    q3:{type:"q",text:"Expectativa de vida > 3 meses E paciente clinicamente operável?",
      yes:"r1", no:"r2"},
    r1:{type:"r",cls:"surgical-major",title:"Fixação Cirúrgica + Radioterapia Adjuvante",
      txt:"Hastes intramedulares são o padrão-ouro para fraturas patológicas de ossos longos. Preferir haste longa cobrindo todo o osso. Radioterapia pós-operatória em 2-3 semanas.",
      details:[["Implante","Haste intramedular bloqueada (cobre osso inteiro)"],["Cimento","Augmentação com PMMA se necessário"],["Radioterapia","Iniciar 2-3 sem pós-op; 30 Gy em 10 frações"],["Carga","Carga total imediata no pós-op"],["Critério de Mirels","Score ≥ 9 → fixação profilática"]]},
    r2:{type:"r",cls:"conservative",title:"Cuidados Paliativos / Fixação Paliativa Mínima",
      txt:"Expectativa de vida curta ou alto risco cirúrgico: imobilização paliativa, controle da dor, radioterapia isolada se possível.",
      details:[["Analgesia","Opioide forte + bisfosfonato IV"],["Radioterapia","Dose única (8 Gy) para controle da dor"],["Imobilização","Órtese ou tração, se tolerável"]]},
    q4:{type:"q",text:"Fratura de coluna vertebral com déficit neurológico?",
      yes:"r3", no:"q5"},
    r3:{type:"r",cls:"emergency",title:"Descompressão Cirúrgica Urgente — Coluna",
      txt:"Déficit neurológico progressivo em fratura patológica de coluna: cirurgia de descompressão + estabilização em até 24-48h.",
      details:[["Abordagem","Corpectomia + fusão instrumentada"],["Radioterapia","Pós-op para controle local"],["Corticóide","Dexametasona 10 mg IV bolus + 4 mg 6/6h"]]},
    q5:{type:"q",text:"Fratura de membro superior com dor incapacitante ou instabilidade funcional significativa?",
      yes:"r4", no:"r5"},
    r4:{type:"r",cls:"surgical",title:"Fixação Percutânea ou Placa + Cimento",
      txt:"Úmero proximal e distal: haste ou placa com augmentação de cimento. Preservar função de preensão e ADM.",
      details:[["Úmero proximal","Haste anterógrada + cimento se necessário"],["Úmero distal","Placa + cimento ou artroplastia"],["Rádio/ulna","Placa convencional"]]},
    r5:{type:"r",cls:"conservative",title:"Tratamento Conservador + Radioterapia",
      txt:"Fraturas de membros superiores com boa estabilidade relativa: imobilização + radioterapia para controle da dor e do tumor.",
      details:[["Imobilização","Órtese funcional (Sarmiento)"],["Radioterapia","30 Gy em 10 frações"]]},
    q6:{type:"q",text:"Fratura em paciente jovem com lesão óssea expansiva / aspecto agressivo no RX?",
      yes:"r6", no:"r7"},
    r6:{type:"r",cls:"surgical",title:"Biópsia Antes de Qualquer Fixação",
      txt:"NUNCA fixar fratura óssea patológica de origem desconhecida em paciente jovem sem biópsia prévia. Risco de contaminar planos cirúrgicos e prejudicar cirurgia oncológica definitiva.",
      details:[["Biópsia","Tru-cut ou excisional pelo oncologista ortopédico"],["Encaminhamento","Centro de referência em oncologia musculoesquelética"],["Estabilização","Tração esquelética provisória se instável"]]},
    r7:{type:"r",cls:"conservative",title:"Fratura de Insuficiência / Estresse — Avaliação Metabólica",
      txt:"Afastar osteoporose, osteomalacia, hiperparatireoidismo. Tratar causa base antes de definir conduta definitiva.",
      details:[["Exames","DXA, PTH, vitamina D, Ca, fósforo, TSH"],["Tratamento","Bisfosfonatos + vitamina D + cálcio"],["Consolidação","Geralmente conservadora com descarga progressiva"]]}}
},

tev:{
  region:"geral", num:"RWA Alg.26-1",
  title:"Profilaxia de TEV em Trauma",
  src:"Rockwood Adults 10ª ed. · Cap. 26",
  icon:"🩸", tags:["c","s"],
  start:"q1",
  nodes:{
    q1:{type:"q",text:"Paciente tem contraindicação ABSOLUTA à profilaxia farmacológica?",
      ctx:"TCE com sangramento ativo, hemorragia medular, trombocitopenia < 50k, coagulopatia não corrigida, lesão vascular ativa.",
      yes:"r1", no:"q2"},
    r1:{type:"r",cls:"conservative",title:"Profilaxia Mecânica Exclusiva",
      txt:"Dispositivos de compressão pneumática intermitente (CPI) em ambos os MMII desde a admissão. Reavaliação diária para iniciar farmacológica assim que seguro.",
      details:[["CPI","Aplicar bilateralmente, inclusive no membro lesado se possível"],["Meias","Meias elásticas de compressão graduada"],["Reavaliação","Diária para transição para profilaxia farmacológica"]]},
    q2:{type:"q",text:"Paciente de alto risco para TEV?",
      ctx:"Fratura de pelve, acetábulo, colo femoral, trocantérica, diáfise femoral; cirurgia de grande porte; imobilização > 72h; história de TVP/TEP.",
      yes:"q3", no:"q4"},
    q3:{type:"q",text:"Cirurgia de grande porte programada nas próximas 12h?",
      yes:"r2", no:"r3"},
    r2:{type:"r",cls:"surgical",title:"Iniciar Profilaxia Farmacológica 6-12h Pós-op",
      txt:"Heparina de baixo peso molecular (HBPM) deve ser iniciada 6-12h após hemostasia cirúrgica satisfatória. Associar CPI no intraoperatório.",
      details:[["HBPM","Enoxaparina 40 mg SC 1x/dia (ou 30 mg 12/12h se alto risco)"],["Início","6-12h pós-op em pacientes de baixo risco hemorrágico"],["Duração","Mínimo 14 dias; até 35 dias em cirurgia de quadril"],["CPI","Manter até deambulação total"]]},
    r3:{type:"r",cls:"surgical",title:"Profilaxia Farmacológica Imediata",
      txt:"Iniciar HBPM o mais precocemente possível, idealmente nas primeiras 12-24h após o trauma.",
      details:[["HBPM","Enoxaparina 40 mg SC 1x/dia"],["Alternativa","Rivaroxabana 10 mg VO 1x/dia após cirurgia de quadril/joelho"],["Duração","14-35 dias dependendo do procedimento"],["CPI","Associar sempre"]]},
    q4:{type:"q",text:"Paciente de risco intermediário (cirurgia de pequeno/médio porte, imobilização parcial)?",
      yes:"r4", no:"r5"},

      txt:"HIC pediátrica: cabeceira 30°, normoventilar (pCO2 35-40 mmHg), manitol 0,25-1 g/kg. Neurocirurgia urgente se hematoma expansivo.",
      details:[["Cabeceira","30°, linha média"],["Manitol","0,25-1 g/kg IV; hiperventilação apenas se herniação iminente"],["pCO2","Manter 35-40 mmHg; hiperventilação temporária se herniação"],["Neurocirurgia","Hematoma epidural: craniectomia de urgência"]]},
    q4:{type:"q",text:"Abdome instável (FAST positivo com hipotensão)?",
      yes:"r4", no:"r5"},
    r4:{type:"r",cls:"emergency",title:"Laparotomia Exploradora de Urgência",
      txt:"FAST positivo + instabilidade: laparotomia de urgência. Em crianças estáveis: TC abdominal antes da cirurgia.",
      details:[["Estável","TC abdominal + manejo conservador de órgãos sólidos (baço, fígado)"],["Instável","Laparotomia imediata"],["Baço","Salvar se possível — criança: risco de sepse pós-esplenectomia"]]},
    r5:{type:"r",cls:"surgical",title:"Fraturas do Esqueleto — Estabilização em Ordem de Prioridade",
      txt:"Após estabilização das lesões vitais: tratar fraturas por ordem de prioridade (coluna > pelve > fêmur > outros).",
      details:[["Coluna","Imobilizar e confirmar via TC e RM"],["Pelve","Cinta pélvica se instável; fixação diferida"],["Fêmur","TENS ou gesso espica dependendo da idade"],["Membro superior","Fios K ou gesso; pode diferir 24-48h se estável"]]}}
}

}; // fim ALGS

// ─── STATE ───
let currentRegion = 'geral';
let currentAlg = null;
let history = [];
let currentNode = null;

// ─── RENDER REGIONS ───
function showRegion(r, btn) {
  currentRegion = r;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const region = REGIONS[r];
  const algs = Object.entries(ALGS).filter(([,a]) => a.region === r);
  const content = document.getElementById('content');
  content.className = region.cls;
  content.innerHTML = `
    <div class="rh" style="">
      <span class="rh-icon">${region.icon}</span>
      <h2>${region.label}</h2>
      <span class="rh-count">${algs.length} algoritmo${algs.length!==1?'s':''}</span>
    </div>
    <div class="alg-grid">
      ${algs.map(([id,a]) => `
        <div class="acard ${region.cls}" onclick="openAlg('${id}')">
          <div class="cn">${a.num}</div>
          <div class="ct">${a.icon} ${a.title}</div>
          <div class="cs">${a.src}</div>
          <div class="ctags">${(a.tags||[]).map(t => tagBadge(t)).join('')}</div>
        </div>`).join('')}
    </div>`;
}

function tagBadge(t) {
  const map = {c:['tag-c','Conservador'], s:['tag-s','Cirúrgico'], sm:['tag-sm','Grande Porte'], e:['tag-e','Emergência'], p:['tag-p','Pediatria']};
  const [cls,lbl] = map[t] || ['tag-c',t];
  return `<span class="tag ${cls}">${lbl}</span>`;
}

// ─── OPEN ALGORITHM ───
function openAlg(id) {
  const a = ALGS[id];
  if (!a) return;
  currentAlg = id;
  history = [];
  const region = REGIONS[a.region];
  document.getElementById('mod').className = region.cls;
  document.getElementById('mhd-icon').textContent = a.icon;
  document.getElementById('mhd-title').textContent = a.title;
  document.getElementById('mhd-src').textContent = a.src + ' · ' + a.num;
  document.getElementById('ov').classList.remove('hidden');
  goToNode(a.start);
}

function closeModal() {
  document.getElementById('ov').classList.add('hidden');
  currentAlg = null;
  history = [];
}

function restartAlg() {
  if (!currentAlg) return;
  history = [];
  goToNode(ALGS[currentAlg].start);
}

function goBack() {
  if (history.length < 2) return;
  history.pop();
  const prev = history.pop();
  goToNode(prev);
}

function goToNode(nodeId) {
  const a = ALGS[currentAlg];
  if (!a || !a.nodes[nodeId]) return;
  history.push(nodeId);
  currentNode = nodeId;
  const node = a.nodes[nodeId];
  updateProgress();
  renderNode(node, nodeId);
  document.getElementById('btn-back').disabled = history.length < 2;
}

function updateProgress() {
  const a = ALGS[currentAlg];
  const total = Object.keys(a.nodes).length;
  const visited = history.length;
  const pct = Math.min(100, Math.round((visited / total) * 100));
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('ptxt').textContent = `Passo ${visited}`;
  document.getElementById('mft-info').textContent = `${visited}/${total} nós`;
}

function renderNode(node, nodeId) {
  const body = document.getElementById('mbody');
  // breadcrumbs
  const a = ALGS[currentAlg];
  const bcHTML = history.slice(0, -1).map((id, i) => {
    const n = a.nodes[id];
    const lbl = n.text ? n.text.substring(0, 40) + (n.text.length > 40 ? '…' : '') : id;
    return `<span class="bc" title="${n.text||''}">${lbl}</span>`;
  }).join('<span style="color:#374151;font-size:9px">›</span>');
  const curLbl = node.text ? node.text.substring(0, 40) + (node.text.length > 40 ? '…' : '') : nodeId;
  const breadcrumbs = (bcHTML ? bcHTML + '<span style="color:#374151;font-size:9px">›</span>' : '') +
    `<span class="bc cur">${curLbl}</span>`;

  if (node.type === 'r') {
    body.innerHTML = `
      <div class="breadcrumbs">${breadcrumbs}</div>
      <div class="rn ${node.cls}">
        <div class="rn-badge">${clsBadge(node.cls)}</div>
        <div class="rn-title">${node.title}</div>
        <div class="rn-txt">${node.txt}</div>
        ${node.details ? `<div class="rn-details">${node.details.map(([l,v]) =>
          `<div class="rn-di"><span class="dil">${l}</span><span>${v}</span></div>`).join('')}</div>` : ''}
      </div>
      <div style="text-align:center;margin-top:8px">
        <button class="btn btn-sec" onclick="restartAlg()">↺ Recomeçar do início</button>
      </div>`;
    return;
  }

  if (node.type === 'multi') {
    body.innerHTML = `
      <div class="breadcrumbs">${breadcrumbs}</div>
      <div class="nq">
        <div class="nq-lbl">Selecione uma opção</div>
        <div class="nq-txt">${node.text}</div>
        ${node.ctx ? `<div class="nq-ctx">${node.ctx}</div>` : ''}
      </div>
      <div class="opts">
        ${node.options.map((opt, i) => `
          <button class="opt" onclick="goToNode('${opt.next}')">
            <span class="opt-ico">${['①','②','③','④'][i]||'•'}</span>
            <div>
              <div class="opt-lbl">${opt.label}</div>
              ${opt.desc ? `<div class="opt-dsc">${opt.desc}</div>` : ''}
            </div>
          </button>`).join('')}
      </div>`;
    return;
  }

  // type === 'q' (yes/no decision)
  body.innerHTML = `
    <div class="breadcrumbs">${breadcrumbs}</div>
    <div class="nq">
      <div class="nq-lbl">Decisão Clínica</div>
      <div class="nq-txt">${node.text}</div>
      ${node.ctx ? `<div class="nq-ctx">${node.ctx}</div>` : ''}
    </div>
    <div class="opts two">
      <button class="opt yes" onclick="goToNode('${node.yes}')">
        <span class="opt-ico">✓</span>
        <div>
          <div class="opt-lbl">Sim</div>
          <div class="opt-dsc">Critério presente</div>
        </div>
      </button>
      <button class="opt no" onclick="goToNode('${node.no}')">
        <span class="opt-ico">✗</span>
        <div>
          <div class="opt-lbl">Não</div>
          <div class="opt-dsc">Critério ausente</div>
        </div>
      </button>
    </div>`;
}

function clsBadge(cls) {
  const map = {
    conservative: '🌿 Conservador',
    surgical: '🔧 Cirúrgico',
    'surgical-major': '⚕️ Grande Porte',
    emergency: '🚨 Emergência'
  };
  return map[cls] || cls;
}

// ─── INIT ───
showRegion('geral', document.querySelector('.rbtn[data-r="geral"]'));
</script>
</body>
</html>
